# Keep-alive ping (PRD §12, NF-9). Supabase free-tier projects pause after ~1 week idle, which
# would silently kill reminders and reads. A tiny read every 6 hours keeps the project warm.
# For a daily-use app this rarely matters, but the ping removes the risk entirely.
#
# Repo secrets required:
#   EMBER_SUPABASE_URL       https://<PROJECT-REF>.supabase.co
#   EMBER_SUPABASE_ANON_KEY  the public anon key (RLS still applies; the read returns nothing)
name: ember keep-alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.EMBER_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EMBER_SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "keep-alive responded $code"
          test "$code" = "200"
